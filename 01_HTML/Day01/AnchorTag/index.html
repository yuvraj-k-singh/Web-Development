<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag</title>
</head>
<body>
    <h1>Anchor Tag</h1>
    <p>Anchor tag is used to create a hyperlink to another webpage or a specific section within the same webpage.</p>

    <hr>

    <!-- Anchor Tag Same Page -->
    <a href="https://www.duplichecker.com/">Same Page</a>

    <!-- Anchor Tag External Link -->
    <a href="https://www.duplichecker.com/" target="_blank">External Page</a>
    
</body>
</html>
