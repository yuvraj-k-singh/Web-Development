<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Lists Type 3</title>
</head>
<body>
    <h1>Country Lists</h1>
    
    <!-- Nested Unordered List Type3 -->
    <ul>
        <li>India
            <ul>
                <li>Delhi
                    <ol>
                        <li>Dwarka</li>
                        <li>Vikaspuri</li>
                    </ol>
                </li>
                <li>Mumbai</li>
                <li>Goa</li>
            </ul>
        </li>
        <li>USA
            <ul>
                <li>California</li>
                <li>Texas
                    <ol>
                        <li>Houston</li>
                        <li>Austin</li>
                        <li>Dallas</li>
                    </ol>
                </li>
            </ul>
        </li>
        <li>UK
            <ul>
                <li>London</li>
                <li>Oval</li>
                <li>Yorkshire</li>
            </ul>
        </li>
    </ul>
</body>
</html>
