<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Type 2</title>
</head>
<body>
    <h1>Fruit Lists: </h1>

    <table border="1" width="100%">
        <thead>
            <th>Fruit Name</th>
            <th>Quantity</th>
        </thead>
        
        <tbody>
            <tr>
                <td>Mango</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Apple</td>
                <td>15
                </td>
            </tr>
            <tr>
                <td>Orange</td>
                <td>20</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>Total</th>
                <th>45</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
