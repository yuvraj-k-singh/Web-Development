<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Span</title>
</head>
<body>
    <h1>Developer Information</h1>

    <table border="1" width="100%" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th colspan="2">Contact Information</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Yuvraj</td>
                <td>yuvraj@example.com</td>
                <td>9876543210</td>
            </tr>
            <tr>
                <td>Mohit</td>
                <td>mohit@example.com</td>
                <td>9888543210</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>priya@example.com</td>
                <td>9878543210</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
