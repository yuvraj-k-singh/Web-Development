<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row Span</title>
</head>
<body>
    <h1>Table Row Span</h1>

    <table border="1" width="100%" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Contact Information</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2">Yuvraj</td>
                <td>Singh</td>
                <td>yuvraj@example.com</td>
            </tr>
            <tr>
                <td>Kumar</td>
                <td>mohit@example.com</td>
            </tr>
            <tr>
                <td>Priya</td>
                <td>Patidar</td>
                <td>Priya@example.com</td>
            </tr>
            <tr></tr>
            <tr></tr>
        </tbody>
    </table>
</body>
</html>
