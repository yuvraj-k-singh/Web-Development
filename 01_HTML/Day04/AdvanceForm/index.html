<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Form</title>
</head>
<body>
    <main>
        <h1 style="text-align: center;">Advance Form</h1>

        <form action="#">
            <label for="userName">User Name: </label>
            <input type="text" name="userName" id="userName">
            <br><br>

            <label for="userPassword">Password: </label>
            <input type="password" name="userPassword" id="userPassword">
            <br><br>

            <label for="userGender">Gender: </label>
            <label for="male">Male</label>
            <input type="radio" name="userGender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="userGender" id="female" value="female">
            <label for="other">Other</label>
            <input type="radio" name="userGender" id="other" value="other">
            <br><br>

            <label for="Subjects">Subjects: </label>
            <label for="math">Math</label>
            <input type="checkbox" name="userSubject" id="math" value="math">
            <label for="science">Science</label>
            <input type="checkbox" name="userSubject" id="science" value="science">
            <label for="social">Social</label>
            <input type="checkbox" name="userSubject" id="social" value="social">
            <br><br>

            <input type="submit">

        </form>
    </main>
</body>
</html>
