<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form</title>
</head>
<body>
    <main>
        <h1>Basic Form</h1>
        <form action="#">
            <label>Name: </label>
            <!-- here "name" is the attribute used to identify the input field and helped in database operations -->
            <input type="text" name="userName" id="userName">

            <br><br>
            <!-- here "label" is used to provide a description for the input field -->
            <label>Email: </label>
            <input type="email" name="userEmail" id="userEmail">

            <br><br>
            <label for="password">Password: </label>
            <input type="password" name="userPassword" id="userPassword">

            <br><br>
            <label for="age">Age: </label>
            <input type="number" name="userAge" id="userAge">

            <br><br>
            <input type="submit">
        </form>
    </main>
</body>
</html>
