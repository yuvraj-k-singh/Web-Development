<body>
    <header>
        <h1>CodeX Course</h1>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>

            </ul>
        </nav>
    </header>

    <body>
        <section class="heading">
            <h2>Contact Us</h2>
            <p>Have questions or want to learn more? Get in touch with us!</p>
        </section>

        <section class="contactForm">
            <form action="#">
                <label for="userName">Your name: </label>
                <input type="text" id="userName" name="userName" placeholder="Enter name" required>
                <br><br>

                <label for="userEmail">Your email: </label>
                <input type="email" id="userEmail" name="userEmail" placeholder="Enter email" required>
                <br><br>

                <label for="userMessage">Your message: </label>
                <br>
                <textarea name="userMessage" id="userMessage" placeholder="Enter your message" required cols="50" rows="8"></textarea>
                <br><br>

                <input type="checkbox" name="userAggrement" id="userAggrement" value="agreed" required>
                <label for="userAggrement">I agree to the terms and conditions</label>
                <br><br>

                <input type="submit" value="Submit Form">
            </form>
        </section>
        <hr>
    </body>

    <footer>
        <p style="text-align: center;">copyright © 2023 CodeX Academy. All rights reserved.</p>
    </footer>
</body>
