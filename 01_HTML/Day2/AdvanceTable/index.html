<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Table</title>
</head>
<body>
    <h1>Advanced Table</h1>

    <table border="1" width="100%" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Level 1</th>
                <th>Level 2</th>
                <th>Level 3</th>
                <th>Level 4</th>
                <th>Level 5</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="6">System</td>
                <td rowspan="4">System App</td>
                <td rowspan="3">System Environment</td>
                <td>App Test</td>
                <td rowspan="2">Foo</td>
            </tr>
            <tr>
                <td>App Memory</td>
            </tr>
            <tr>
                <td>App Test</td>
                <td rowspan="2">Bar</td>
            </tr>
            <tr>
                <td>System Env 2</td>
                <td>App Memory</td>
            </tr>
            <tr>
                <td colspan="2" rowspan="2">System Memory</td>
                <td>Memory Function</td>
                <td>Foo</td>
            </tr>
            <tr>
                <td>App Test</td>
                <td>Bar</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
