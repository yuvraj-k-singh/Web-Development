<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Lists Type 2</title>
</head>
<body>
    <h1>Country Lists</h1>
    
    <!-- Nested Unordered List Type2 -->
    <ul>
        <li>India
            <ul>
                <li>Delhi</li>
                <li>Mumbai</li>
                <li>Goa</li>
            </ul>
        </li>
        <li>USA
            <ul>
                <li>California</li>
                <li>Texas</li>
            </ul>
        </li>
        <li>UK
            <ul>
                <li>London</li>
                <li>Oval</li>
                <li>Yorkshire</li>
            </ul>
        </li>
    </ul>
</body>
</html>
