<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>List</h1>

    <h2>Ordered List</h2>

        <li>Test1</li>
        <li>Test2</li>
        <li>Test3</li>
        <li>Test4</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Test1</li>
        <li>Test2</li>
        <li>Test3</li>
        <li>Test4</li>
    </ul>

</body>
</html>
