<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <!-- Login Screen -->
        <section class="login-screen">
            <div class="login-container">
                <div class="login-header">
                    <h1>Sign in to MusicFlow</h1>
                    <p>Continue to your music</p>
                    <div class="logo">
                    </div>
                </div>

                <div class="input-container">
                    <!-- Input Fields -->
                    <form action="#">
                        <label for="user-email" class="input-label">Email address</label>
                        <input type="email" id="user-email" name="user-email" placeholder="user@example.com" required>

                        <label for="user-pass" class="input-label">Password</label>
                        <input type="password" id="user-pass" name="user-pass" placeholder="Enter your password" required>

                        <div class="input-remember">
                            <input type="checkbox" id="remember-me" name="remember-me" itemid="remember">
                            <label for="remember-me" id="remember-label">Remember me</label>
                        </div>

                        <!-- Login Button -->
                        <div class="login-btn">
                            <button type="submit">Sign In</button>
                        </div>
                    </form>
                </div>
                
                <!-- Line divider -->
                <div class="line-div">
                    <hr><div class="line">or</div><hr>
                </div>

                <!-- Another Login Option -->
                <div class="other-login">
                    <button class="google-btn"><div class="google-logo"></div>Sign in with Google</button>
                    <button class="apple-btn"><div class="apple-logo"></div>Sign in with Apple</button>
            </div>
        </section>
    </main>
</body>
</html>
