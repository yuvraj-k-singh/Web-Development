<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Bar</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-bar">
                <div class="logo-container">
                    <div class="logo"></div>
                    <h1>Quantix</h1>
                </div>

                <span>
                    <a href="#">Features</a>
                    <a href="#">Pricing</a>
                    <a href="#">Docs</a>
                    <a href="#">Template</a>
                </span>

                <div class="nav-btn">
                        <button type="button" class="sign-up-btn">Sign Up</button>
                        <button type="button" class="log-in-btn">Log In</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="whatsapp-logo"></div>

        <section class="main">
            <h1 style="font-size: 61px; padding-top: 60px;">WELCOME TO OUR STUDIO</h1>
            <p style="font-size: 16px;">WE CREATE BEAUTIFUL DIGITAL EXPERIENCES</p>
        </section>
        <section class="hero">
            <h2 style="color: white; font-size: 62px;">WHAT WE DO</h2>
            <span class="sec-text2"><p>Design</p> <p>Develop</p> <p>Deliever</p></span>
        </section>
        <section class="contact">
            <h2 style="color: white; font-size: 75px">GET IN TOUCH</h2>
            <p style="font-size: 22px; color: white;">LET'S START SOMETHING GREAT TOGETHER</p>
            <div class="contact-form">
                <form action="#"></form>
                    <div class="name-email">
                        <input type="text" name="user-name" placeholder="Your Name" class="input-name">
                        <input type="email" name="user-email" placeholder="Your Email" class="input-email">
                    </div>
                    
                    <div class="text-area">
                        <textarea name="" id="" rows="10" placeholder="Your Message"></textarea>
                        <button type="submit" class="sbt-btn">Submit</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
