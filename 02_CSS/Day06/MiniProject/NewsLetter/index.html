<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsLetter Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <section class="news-letter">
            <div class="container">
                <div class="back-color1"></div>
                <div class="back-color2"></div>
                <div class="email-container">
                    <h2>Join Now NewsLetter</h2>
                    <p>Join to get daily exixted news about matches</p>
                    <div class="submit-btn">
                        <form action="#">
                            <input type="email" name="user-email" id="user-email" placeholder="user@email.com">
                            <button type="submit">Join Now</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
